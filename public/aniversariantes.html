<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniversariantes | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">

<div id="sidebar"></div>

<div class="min-h-screen md:ml-72">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>

            <div class="flex items-center gap-3">
                <img
                        src="/assets/logo-beatriz-beauty.jpg"
                        alt="Logo"
                        class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]"
                />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Aniversariantes</h1>
                    <p class="text-sm text-[#7d6a75]">Envie mensagens e fortaleça a fidelização 🎉</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="mensagem" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>

        <!-- Filtro -->
        <section class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm mb-6">
            <div class="flex flex-col lg:flex-row gap-4 lg:items-end">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-[#5e4b55] mb-2">Data</label>
                    <input
                            id="data"
                            type="date"
                            class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]"
                    />
                    <p class="text-xs text-[#7d6a75] mt-2">Por padrão, mostra aniversariantes de hoje.</p>
                </div>

                <div class="flex gap-3">
                    <button
                            id="btnBuscar"
                            class="rounded-2xl bg-[#b78ea5] text-white px-6 py-3.5 font-semibold hover:bg-[#a97f97] transition shadow-md"
                    >
                        Buscar
                    </button>

                    <button
                            id="btnHoje"
                            class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-6 py-3.5 rounded-2xl font-semibold transition"
                    >
                        Hoje
                    </button>
                </div>
            </div>

            <div class="mt-6">
                <label class="block text-sm font-medium text-[#5e4b55] mb-2">Mensagem (modelo)</label>
                <textarea
                        id="templateMensagem"
                        rows="4"
                        class="w-full rounded-2xl border border-[#e8d9e2] bg-[#fffdfe] px-4 py-3 text-[#3f3138] outline-none resize-none transition focus:border-[#c29ab0] focus:ring-4 focus:ring-[#f3e7ee]"
                ></textarea>
                <p class="text-xs text-[#7d6a75] mt-2">
                    Use <strong>{NOME}</strong> para substituir automaticamente pelo nome da cliente.
                </p>
            </div>
        </section>

        <!-- Lista -->
        <section class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-[#3f3138]">Lista</h2>
                <span id="contador" class="text-sm text-[#7d6a75]">0 cliente(s)</span>
            </div>

            <div id="lista" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>

<script>
    const msgEl = document.getElementById("mensagem");
    const dataEl = document.getElementById("data");
    const btnBuscar = document.getElementById("btnBuscar");
    const btnHoje = document.getElementById("btnHoje");
    const listaEl = document.getElementById("lista");
    const contadorEl = document.getElementById("contador");
    const templateEl = document.getElementById("templateMensagem");

    function show(texto, tipo="erro") {
        msgEl.textContent = texto;
        msgEl.className = "mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center block";
        if (tipo === "sucesso") msgEl.classList.add("bg-green-50","text-green-700","border","border-green-200");
        else msgEl.classList.add("bg-red-50","text-red-700","border","border-red-200");
    }
    function hide() {
        msgEl.className = "hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center";
    }

    function soNumeros(v) { return String(v || "").replace(/\D/g, ""); }

    function setHoje() {
        const hoje = new Date();
        const y = hoje.getFullYear();
        const m = String(hoje.getMonth()+1).padStart(2,"0");
        const d = String(hoje.getDate()).padStart(2,"0");
        dataEl.value = `${y}-${m}-${d}`;
    }

    function formatarDataBR(dataISO) {
        if (!dataISO) return "-";
        const d = String(dataISO).slice(0,10);
        const [y,m,day] = d.split("-");
        return `${day}/${m}/${y}`;
    }

    function mensagemPersonalizada(nome) {
        const tpl = templateEl.value || "";
        return tpl.replaceAll("{NOME}", nome);
    }

    function linkWhats(nome, telefone) {
        const tel = soNumeros(telefone);
        if (!tel) return "#";
        const texto = encodeURIComponent(mensagemPersonalizada(nome));
        return `https://wa.me/55${tel}?text=${texto}`;
    }

    function cardCliente(c) {
        const div = document.createElement("div");
        div.className = "rounded-3xl border border-[#efe4ea] bg-[#fcfafb] p-5";

        const nasc = c.data_nascimento ? formatarDataBR(c.data_nascimento) : "Não informado";
        const tel = c.telefone || "";

        div.innerHTML = `
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-semibold text-[#3f3138] break-words">${c.nome}</p>
            <p class="text-sm text-[#7d6a75] mt-2">📞 ${tel || "Não informado"}</p>
            <p class="text-sm text-[#7d6a75] mt-1">🎂 ${nasc}</p>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-1 gap-2">
          <a
            class="inline-flex w-full items-center justify-center rounded-2xl bg-green-600 px-4 py-3 text-white font-semibold hover:bg-green-700 transition"
            target="_blank"
            href="${tel ? linkWhats(c.nome, tel) : "#"}"
            ${tel ? "" : "aria-disabled='true'"}
          >
            Enviar WhatsApp 🎉
          </a>

          <button
            class="btn-copiar bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-4 py-3 rounded-2xl font-semibold transition"
            data-nome="${encodeURIComponent(c.nome)}"
          >
            Copiar mensagem
          </button>
        </div>
      `;

        return div;
    }

    async function carregar() {
        hide();
        listaEl.innerHTML = `<div class="col-span-full text-[#7d6a75]">Carregando...</div>`;
        contadorEl.textContent = "0 cliente(s)";

        const data = dataEl.value;
        if (!data) {
            show("Selecione uma data.");
            listaEl.innerHTML = "";
            return;
        }

        const dt = new Date(data + "T00:00:00");
        const dia = dt.getDate();
        const mes = dt.getMonth() + 1;

        const r = await fetch(`/api/relatorios/aniversariantes?dia=${dia}&mes=${mes}`);
        const json = await r.json();

        if (!r.ok) {
            show(json.erro || "Erro ao buscar aniversariantes");
            listaEl.innerHTML = "";
            return;
        }

        listaEl.innerHTML = "";
        contadorEl.textContent = `${json.length} cliente(s)`;

        if (!json.length) {
            listaEl.innerHTML = `
          <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
            Nenhuma aniversariante nessa data.
          </div>
        `;
            return;
        }

        json.forEach(c => listaEl.appendChild(cardCliente(c)));

        document.querySelectorAll(".btn-copiar").forEach(btn => {
            btn.addEventListener("click", async () => {
                const nome = decodeURIComponent(btn.dataset.nome || "");
                const texto = mensagemPersonalizada(nome);
                try {
                    await navigator.clipboard.writeText(texto);
                    show("Mensagem copiada! ✅", "sucesso");
                } catch {
                    show("Não foi possível copiar automaticamente. Seu navegador pode bloquear.", "erro");
                }
            });
        });
    }

    // template padrão
    templateEl.value =
        `Oi, {NOME}! 🎉 A Beatriz Beauty deseja um feliz aniversário! 💅✨
Hoje você tem um mimo especial no salão. Quer agendar seu horário?`;

    btnBuscar.addEventListener("click", carregar);
    btnHoje.addEventListener("click", () => { setHoje(); carregar(); });

    setHoje();
    carregar();
</script>
</body>
</html>
