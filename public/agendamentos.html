<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamentos | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">

<div id="sidebar"></div>

<!-- ✅ transition pra acompanhar sidebar colapsável -->
<div class="min-h-screen md:ml-72 transition-all duration-300">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>

            <div class="flex items-center gap-3">
                <img
                        src="/assets/logo-beatriz-beauty.jpg"
                        alt="Logo"
                        class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]"
                />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Agendamentos</h1>
                    <p class="text-sm text-[#7d6a75]">Visualize e gerencie os horários</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section class="bg-white rounded-3xl border border-[#eadde5] p-5 md:p-6 shadow-sm">

            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
                <div class="min-w-0">
                    <h2 class="text-xl font-semibold text-[#3f3138]">Lista de agendamentos</h2>
                    <p class="text-sm text-[#7d6a75]">Filtre por status e data para organizar a agenda.</p>
                </div>

                <!-- ✅ filtros 100% no mobile -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 w-full lg:w-auto">
                    <select
                            id="filtroStatus"
                            class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0] transition bg-white"
                    >
                        <option value="">Todos os status</option>
                        <option value="AGENDADO">Agendado</option>
                        <option value="CONFIRMADO">Confirmado</option>
                        <option value="REALIZADO">Realizado</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select>

                    <input
                            id="filtroData"
                            type="date"
                            class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0] transition bg-white"
                    />

                    <button
                            id="atualizarLista"
                            class="w-full rounded-2xl bg-[#b78ea5] hover:bg-[#a97f97] text-white px-5 py-3 font-semibold transition shadow-md"
                    >
                        Atualizar
                    </button>

                    <button
                            id="limparFiltros"
                            class="w-full rounded-2xl bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-5 py-3 font-semibold transition"
                    >
                        Limpar
                    </button>
                </div>
            </div>

            <div id="mensagem" class="hidden mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>

            <!-- ✅ grid mais adaptável -->
            <div id="listaAgendamentos" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
        </section>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>

<script>
    const listaAgendamentos = document.getElementById("listaAgendamentos");
    const mensagem = document.getElementById("mensagem");
    const atualizarListaBtn = document.getElementById("atualizarLista");
    const filtroStatus = document.getElementById("filtroStatus");
    const filtroData = document.getElementById("filtroData");
    const limparFiltrosBtn = document.getElementById("limparFiltros");

    function mostrarMensagem(texto, tipo = "erro") {
        mensagem.textContent = texto;
        mensagem.className = "mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center block";
        if (tipo === "sucesso") {
            mensagem.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
        } else {
            mensagem.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
        }
    }

    function limparMensagem() {
        mensagem.textContent = "";
        mensagem.className = "hidden mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center";
    }

    function formatarHora(hora) {
        return hora ? String(hora).slice(0, 5) : "-";
    }

    function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function formatarData(dataISO) {
        if (!dataISO) return "-";
        const d = String(dataISO).slice(0, 10);
        const [y, m, day] = d.split("-");
        return `${day}/${m}/${y}`;
    }

    function normalizarData(dataISO) {
        if (!dataISO) return "";
        return String(dataISO).slice(0, 10);
    }

    function corStatus(status) {
        const mapa = {
            AGENDADO: "bg-yellow-50 text-yellow-700 border border-yellow-200",
            CONFIRMADO: "bg-blue-50 text-blue-700 border border-blue-200",
            REALIZADO: "bg-green-50 text-green-700 border border-green-200",
            CANCELADO: "bg-red-50 text-red-700 border border-red-200"
        };
        return mapa[status] || "bg-gray-50 text-gray-700 border border-gray-200";
    }

    function textoPagamento(agendamento) {
        if (agendamento.pago) return `Pago • ${agendamento.forma_pagamento || "—"}`;
        return `Pendente • ${agendamento.forma_pagamento || "PENDENTE"}`;
    }

    function criarCardAgendamento(agendamento) {
        const card = document.createElement("div");
        card.className = "rounded-3xl border border-[#efe4ea] bg-[#fcfafb] p-5";

        card.innerHTML = `
        <div class="flex flex-col gap-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h3 class="text-lg font-semibold text-[#3f3138] break-words">
                ${agendamento.cliente || "Cliente não informado"}
              </h3>
              <p class="text-sm text-[#7d6a75] mt-1 break-words">📞 ${agendamento.telefone || "Não informado"}</p>
              <p class="text-sm text-[#7d6a75] mt-1 break-words">💅 ${agendamento.servico || "Serviço não informado"}</p>
            </div>

            <span class="shrink-0 inline-flex items-center justify-center px-3 py-1 rounded-2xl text-xs font-semibold ${corStatus(agendamento.status)}">
              ${agendamento.status}
            </span>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
            <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
              <p class="text-[#7d6a75]">Data</p>
              <p class="font-semibold text-[#3f3138]">${formatarData(agendamento.data_agendamento)}</p>
            </div>

            <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
              <p class="text-[#7d6a75]">Horário</p>
              <p class="font-semibold text-[#3f3138]">${formatarHora(agendamento.hora_agendamento)}</p>
            </div>

            <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
              <p class="text-[#7d6a75]">Valor</p>
              <p class="font-semibold text-[#3f3138]">${formatarMoeda(agendamento.valor_cobrado || agendamento.valor_servico)}</p>
            </div>

            <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
              <p class="text-[#7d6a75]">Pagamento</p>
              <p class="font-semibold text-[#3f3138]">${textoPagamento(agendamento)}</p>
            </div>
          </div>

          <div>
            <p class="text-sm text-[#7d6a75]">Observações</p>
            <p class="text-sm text-[#5e4b55] mt-1 break-words">${agendamento.observacoes || "Sem observações"}</p>
          </div>

          <div class="flex flex-col sm:flex-row sm:flex-wrap gap-2 pt-2 border-t border-[#f0e7ec]">
            <button class="btn-status w-full sm:w-auto bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-2 rounded-2xl font-medium transition"
              data-id="${agendamento.id}" data-status="CONFIRMADO">
              Confirmar
            </button>

            <button class="btn-status w-full sm:w-auto bg-green-50 hover:bg-green-100 text-green-700 px-3 py-2 rounded-2xl font-medium transition"
              data-id="${agendamento.id}" data-status="REALIZADO">
              Realizado
            </button>

            <button class="btn-status w-full sm:w-auto bg-red-50 hover:bg-red-100 text-red-700 px-3 py-2 rounded-2xl font-medium transition"
              data-id="${agendamento.id}" data-status="CANCELADO">
              Cancelar
            </button>
          </div>
        </div>
      `;

        return card;
    }

    async function atualizarStatus(id, status) {
        try {
            const response = await fetch(`/api/agendamentos/${id}/status`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });

            const data = await response.json();

            if (response.ok) {
                mostrarMensagem(data.mensagem || "Status atualizado com sucesso", "sucesso");
                carregarAgendamentos();
            } else {
                mostrarMensagem(data.erro || "Erro ao atualizar status");
            }
        } catch {
            mostrarMensagem("Erro ao conectar com o servidor");
        }
    }

    async function carregarAgendamentos() {
        limparMensagem();
        listaAgendamentos.innerHTML = `<div class="col-span-full text-[#7d6a75]">Carregando agendamentos...</div>`;

        try {
            const response = await fetch("/api/agendamentos");
            const agendamentos = await response.json();

            if (!response.ok) {
                throw new Error(agendamentos.erro || "Erro ao listar agendamentos");
            }

            let lista = Array.isArray(agendamentos) ? agendamentos : [];

            if (filtroStatus.value) {
                lista = lista.filter(item => item.status === filtroStatus.value);
            }

            if (filtroData.value) {
                lista = lista.filter(item => normalizarData(item.data_agendamento) === filtroData.value);
            }

            listaAgendamentos.innerHTML = "";

            if (lista.length === 0) {
                listaAgendamentos.innerHTML = `
            <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
              Nenhum agendamento encontrado.
            </div>
          `;
                return;
            }

            lista.forEach((agendamento) => {
                listaAgendamentos.appendChild(criarCardAgendamento(agendamento));
            });

            document.querySelectorAll(".btn-status").forEach((btn) => {
                btn.addEventListener("click", () => {
                    atualizarStatus(btn.dataset.id, btn.dataset.status);
                });
            });
        } catch (error) {
            listaAgendamentos.innerHTML = `
          <div class="col-span-full rounded-3xl border border-red-200 bg-red-50 p-6 text-center text-red-600">
            Erro ao carregar agendamentos.
          </div>
        `;
        }
    }

    atualizarListaBtn.addEventListener("click", carregarAgendamentos);
    filtroStatus.addEventListener("change", carregarAgendamentos);
    filtroData.addEventListener("change", carregarAgendamentos);

    limparFiltrosBtn.addEventListener("click", () => {
        filtroStatus.value = "";
        filtroData.value = "";
        carregarAgendamentos();
    });

    carregarAgendamentos();
</script>
</body>
</html>
