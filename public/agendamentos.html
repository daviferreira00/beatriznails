<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamentos | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">

<div id="sidebar"></div>

<div class="min-h-screen md:ml-72">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>

            <div class="flex items-center gap-3">
                <img
                        src="/assets/logo-beatriz-beauty.jpg"
                        alt="Logo"
                        class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]"
                />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Agendamentos</h1>
                    <p class="text-sm text-[#7d6a75]">Visualize e gerencie os horários</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">

            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-xl font-semibold text-[#3f3138]">Lista de agendamentos</h2>
                    <p class="text-sm text-[#7d6a75]">Filtre por status e data para organizar a agenda.</p>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <select
                            id="filtroStatus"
                            class="rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0] transition bg-white"
                    >
                        <option value="">Todos os status</option>
                        <option value="AGENDADO">Agendado</option>
                        <option value="CONFIRMADO">Confirmado</option>
                        <option value="REALIZADO">Realizado</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select>

                    <input
                            id="filtroData"
                            type="date"
                            class="rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0] transition bg-white"
                    />

                    <button
                            id="atualizarLista"
                            class="bg-[#b78ea5] hover:bg-[#a97f97] text-white px-5 py-3 rounded-2xl font-semibold transition shadow-md"
                    >
                        Atualizar
                    </button>

                    <button
                            id="limparFiltros"
                            class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-5 py-3 rounded-2xl font-semibold transition"
                    >
                        Limpar
                    </button>
                </div>
            </div>

            <div id="mensagem" class="hidden mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>

            <div id="listaAgendamentos" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
        </section>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>

<script>
    const listaAgendamentos = document.getElementById("listaAgendamentos");
    const mensagem = document.getElementById("mensagem");
    const atualizarListaBtn = document.getElementById("atualizarLista");
    const filtroStatus = document.getElementById("filtroStatus");
    const filtroData = document.getElementById("filtroData");
    const limparFiltrosBtn = document.getElementById("limparFiltros");

    function mostrarMensagem(texto, tipo = "erro") {
        mensagem.textContent = texto;
        mensagem.className = "mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center block";
        if (tipo === "sucesso") {
            mensagem.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
        } else {
            mensagem.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
        }
    }

    function limparMensagem() {
        mensagem.textContent = "";
        mensagem.className = "hidden mb-5 rounded-2xl px-4 py-3 text-sm font-medium text-center";
    }

    function formatarHora(hora) {
        return hora ? String(hora).slice(0, 5) : "-";
    }

    function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function formatarData(dataISO) {
        if (!dataISO) return "-";
        const d = String(dataISO).slice(0, 10);
        const [y, m, day] = d.split("-");
        return `${day}/${m}/${y}`;
    }

    function normalizarData(dataISO) {
        if (!dataISO) return "";
        return String(dataISO).slice(0, 10);
    }

    function corStatus(status) {
        const mapa = {
            AGENDADO: "bg-yellow-50 text-yellow-700 border border-yellow-200",
            CONFIRMADO: "bg-blue-50 text-blue-700 border border-blue-200",
            REALIZADO: "bg-green-50 text-green-700 border border-green-200",
            CANCELADO: "bg-red-50 text-red-700 border border-red-200"
        };
        return mapa[status] || "bg-gray-50 text-gray-700 border border-gray-200";
    }

    function textoPagamento(agendamento) {
        const forma = agendamento.forma_pagamento || "PENDENTE";

        if (agendamento.pago) {
            const base = Number(agendamento.valor_cobrado || agendamento.valor_servico || 0);
            const final = (agendamento.valor_final != null) ? Number(agendamento.valor_final) : base;
            const temDesc = (agendamento.desconto_tipo && agendamento.desconto_valor != null);

            return temDesc
                ? `Pago • ${forma} • ${formatarMoeda(final)} (c/ desconto)`
                : `Pago • ${forma}`;
        }

        return `Pendente • ${forma}`;
    }

    function calcularValorFinal(base, tipo, valor) {
        const b = Number(base || 0);
        if (!tipo) return b;

        const v = (valor === "" || valor == null) ? null : Number(valor);
        if (v == null || Number.isNaN(v) || v < 0) return b;

        if (tipo === "VALOR") return Math.max(0, b - v);
        if (tipo === "PERCENT") return Math.max(0, b - (b * (v / 100)));
        return b;
    }

    async function atualizarStatus(id, status) {
        try {
            const response = await fetch(`/api/agendamentos/${id}/status`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });

            const data = await response.json();

            if (response.ok) {
                mostrarMensagem(data.mensagem || "Status atualizado com sucesso", "sucesso");
                carregarAgendamentos();
            } else {
                mostrarMensagem(data.erro || "Erro ao atualizar status");
            }
        } catch {
            mostrarMensagem("Erro ao conectar com o servidor");
        }
    }

    async function atualizarPagamento(id, pago, forma_pagamento, desconto_tipo, desconto_valor) {
        try {
            const response = await fetch(`/api/agendamentos/${id}/pagamento`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pago, forma_pagamento, desconto_tipo, desconto_valor })
            });

            const data = await response.json();

            if (response.ok) {
                mostrarMensagem(data.mensagem || "Pagamento atualizado com sucesso", "sucesso");
                carregarAgendamentos();
            } else {
                mostrarMensagem(data.erro || "Erro ao atualizar pagamento");
            }
        } catch {
            mostrarMensagem("Erro ao conectar com o servidor");
        }
    }

    function criarCardAgendamento(agendamento) {
        const card = document.createElement("div");
        card.className = "rounded-3xl border border-[#efe4ea] bg-[#fcfafb] p-5 cursor-pointer";
        card.dataset.id = agendamento.id;

        const baseValor = Number(agendamento.valor_cobrado || agendamento.valor_servico || 0);
        const valorMostrar = (agendamento.valor_final != null)
            ? Number(agendamento.valor_final)
            : baseValor;

        const pagoChecked = agendamento.pago ? "checked" : "";
        const formaAtual = String(agendamento.forma_pagamento || "PENDENTE").toUpperCase();

        const descTipoAtual = (agendamento.desconto_tipo || "");
        const descValorAtual = (agendamento.desconto_valor != null ? Number(agendamento.desconto_valor) : "");

        card.innerHTML = `
      <div class="flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
          <div>
            <h3 class="text-lg font-semibold text-[#3f3138]">${agendamento.cliente || "Cliente não informado"}</h3>
            <p class="text-sm text-[#7d6a75] mt-1">📞 ${agendamento.telefone || "Não informado"}</p>
            <p class="text-sm text-[#7d6a75] mt-1">💅 ${agendamento.servico || "Serviço não informado"}</p>
          </div>

          <span class="inline-flex items-center justify-center px-3 py-1 rounded-2xl text-xs font-semibold ${corStatus(agendamento.status)}">
            ${agendamento.status}
          </span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
          <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
            <p class="text-[#7d6a75]">Data</p>
            <p class="font-semibold text-[#3f3138]">${formatarData(agendamento.data_agendamento)}</p>
          </div>

          <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
            <p class="text-[#7d6a75]">Horário</p>
            <p class="font-semibold text-[#3f3138]">${formatarHora(agendamento.hora_agendamento)}</p>
          </div>

          <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
            <p class="text-[#7d6a75]">Valor</p>
            <p class="font-semibold text-[#3f3138]">${formatarMoeda(valorMostrar)}</p>
            ${(agendamento.valor_final != null && valorMostrar !== baseValor)
            ? `<p class="text-xs text-[#7d6a75] mt-1">Base: ${formatarMoeda(baseValor)}</p>`
            : ``}
          </div>

          <div class="rounded-2xl bg-white px-4 py-3 border border-[#f0e7ec]">
            <p class="text-[#7d6a75]">Pagamento</p>
            <p class="font-semibold text-[#3f3138]">${textoPagamento(agendamento)}</p>
          </div>
        </div>

        <div>
          <p class="text-sm text-[#7d6a75]">Observações</p>
          <p class="text-sm text-[#5e4b55] mt-1">${agendamento.observacoes || "Sem observações"}</p>
        </div>

        <div class="pagamento-panel hidden rounded-3xl border border-[#eadde5] bg-white p-4">
          <div class="flex items-center justify-between gap-3 mb-3">
            <p class="font-semibold text-[#3f3138]">Pagamento</p>
            <span class="text-xs text-[#7d6a75]">Clique no card para fechar</span>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <label class="flex items-center gap-3 rounded-2xl border border-[#f0e7ec] bg-[#fcfafb] px-4 py-3">
              <input type="checkbox" class="chk-pago w-5 h-5 accent-[#b78ea5]" ${pagoChecked} />
              <span class="font-medium text-[#3f3138]">Marcar como pago</span>
            </label>

            <div class="rounded-2xl border border-[#f0e7ec] bg-[#fcfafb] px-4 py-3">
              <p class="text-xs text-[#7d6a75] mb-2">Forma</p>
              <select class="sel-forma w-full rounded-xl border border-[#e8d9e2] px-3 py-2 bg-white outline-none">
                <option value="PENDENTE" ${formaAtual==="PENDENTE" ? "selected":""}>PENDENTE</option>
                <option value="PIX" ${formaAtual==="PIX" ? "selected":""}>PIX</option>
                <option value="DEBITO" ${formaAtual==="DEBITO" ? "selected":""}>DÉBITO</option>
                <option value="CREDITO" ${formaAtual==="CREDITO" ? "selected":""}>CRÉDITO</option>
                <option value="DINHEIRO" ${formaAtual==="DINHEIRO" ? "selected":""}>DINHEIRO</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
            <div class="rounded-2xl border border-[#f0e7ec] bg-[#fcfafb] px-4 py-3">
              <p class="text-xs text-[#7d6a75] mb-2">Tipo de desconto</p>
              <select class="sel-desc-tipo w-full rounded-xl border border-[#e8d9e2] px-3 py-2 bg-white outline-none">
                <option value="" ${descTipoAtual==="" ? "selected":""}>Sem desconto</option>
                <option value="VALOR" ${descTipoAtual==="VALOR" ? "selected":""}>R$</option>
                <option value="PERCENT" ${descTipoAtual==="PERCENT" ? "selected":""}>%</option>
              </select>
            </div>

            <div class="rounded-2xl border border-[#f0e7ec] bg-[#fcfafb] px-4 py-3">
              <p class="text-xs text-[#7d6a75] mb-2">Valor do desconto</p>
              <input
                type="number"
                step="0.01"
                min="0"
                class="inp-desc-valor w-full rounded-xl border border-[#e8d9e2] px-3 py-2 bg-white outline-none"
                placeholder="0"
                value="${descValorAtual}"
              />
              <p class="text-[11px] text-[#7d6a75] mt-1">Base: ${formatarMoeda(baseValor)}</p>
            </div>
          </div>

          <div class="mt-3 rounded-2xl border border-[#f0e7ec] bg-white px-4 py-3 text-sm">
            <div class="flex items-center justify-between">
              <span class="text-[#7d6a75]">Total final</span>
              <strong class="lbl-total-final text-[#3f3138]">${formatarMoeda(valorMostrar)}</strong>
            </div>
          </div>

          <button
            type="button"
            class="btn-salvar-pagamento mt-3 w-full rounded-2xl bg-[#b78ea5] hover:bg-[#a97f97] text-white px-4 py-3 font-semibold transition"
            data-id="${agendamento.id}"
          >
            Salvar pagamento
          </button>
        </div>

        <div class="flex flex-wrap gap-2 pt-2 border-t border-[#f0e7ec]">
          <button class="btn-status bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-2 rounded-2xl font-medium transition"
            data-id="${agendamento.id}" data-status="CONFIRMADO" type="button">
            Confirmar
          </button>

          <button class="btn-status bg-green-50 hover:bg-green-100 text-green-700 px-3 py-2 rounded-2xl font-medium transition"
            data-id="${agendamento.id}" data-status="REALIZADO" type="button">
            Realizado
          </button>

          <button class="btn-status bg-red-50 hover:bg-red-100 text-red-700 px-3 py-2 rounded-2xl font-medium transition"
            data-id="${agendamento.id}" data-status="CANCELADO" type="button">
            Cancelar
          </button>
        </div>
      </div>
    `;

        setTimeout(() => {
            const panel = card.querySelector(".pagamento-panel");
            if (!panel) return;

            const chkPago = panel.querySelector(".chk-pago");
            const selTipo = panel.querySelector(".sel-desc-tipo");
            const inpValor = panel.querySelector(".inp-desc-valor");
            const lblFinal = panel.querySelector(".lbl-total-final");

            function atualizarPreview() {
                if (!chkPago.checked) {
                    lblFinal.textContent = formatarMoeda(baseValor);
                    return;
                }
                const tipo = selTipo.value || null;
                const v = inpValor.value;
                const final = calcularValorFinal(baseValor, tipo, v);
                lblFinal.textContent = formatarMoeda(final);
            }

            chkPago.addEventListener("change", atualizarPreview);
            selTipo.addEventListener("change", atualizarPreview);
            inpValor.addEventListener("input", atualizarPreview);

            atualizarPreview();
        }, 0);

        return card;
    }

    async function carregarAgendamentos() {
        limparMensagem();
        listaAgendamentos.innerHTML = `<div class="col-span-full text-[#7d6a75]">Carregando agendamentos...</div>`;

        try {
            const response = await fetch("/api/agendamentos");
            const agendamentos = await response.json();

            if (!response.ok) throw new Error(agendamentos.erro || "Erro ao listar agendamentos");

            let lista = Array.isArray(agendamentos) ? agendamentos : [];

            if (filtroStatus.value) {
                lista = lista.filter(item => item.status === filtroStatus.value);
            }

            if (filtroData.value) {
                lista = lista.filter(item => normalizarData(item.data_agendamento) === filtroData.value);
            }

            listaAgendamentos.innerHTML = "";

            if (lista.length === 0) {
                listaAgendamentos.innerHTML = `
          <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
            Nenhum agendamento encontrado.
          </div>
        `;
                return;
            }

            lista.forEach((agendamento) => {
                listaAgendamentos.appendChild(criarCardAgendamento(agendamento));
            });

            document.querySelectorAll("#listaAgendamentos > div[data-id]").forEach(card => {
                card.addEventListener("click", (e) => {
                    const tag = (e.target.tagName || "").toLowerCase();
                    if (["button","select","input","a","option","svg","path","circle"].includes(tag)) return;

                    const panel = card.querySelector(".pagamento-panel");
                    if (!panel) return;

                    document.querySelectorAll(".pagamento-panel").forEach(p => {
                        if (p !== panel) p.classList.add("hidden");
                    });

                    panel.classList.toggle("hidden");
                });
            });

            document.querySelectorAll(".btn-status").forEach((btn) => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    atualizarStatus(btn.dataset.id, btn.dataset.status);
                });
            });

            document.querySelectorAll(".btn-salvar-pagamento").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();

                    const panel = btn.closest(".pagamento-panel");
                    const id = btn.dataset.id;

                    const chk = panel.querySelector(".chk-pago");
                    const selForma = panel.querySelector(".sel-forma");
                    const selTipo = panel.querySelector(".sel-desc-tipo");
                    const inpValor = panel.querySelector(".inp-desc-valor");

                    const pago = !!chk.checked;
                    const forma_pagamento = selForma.value;

                    const desconto_tipo = selTipo.value || null;
                    const desconto_valor = (inpValor.value === "" ? null : Number(inpValor.value));

                    atualizarPagamento(id, pago, forma_pagamento, desconto_tipo, desconto_valor);
                });
            });

        } catch (error) {
            console.error(error);
            listaAgendamentos.innerHTML = `
        <div class="col-span-full rounded-3xl border border-red-200 bg-red-50 p-6 text-center text-red-600">
          Erro ao carregar agendamentos.
        </div>
      `;
        }
    }

    atualizarListaBtn.addEventListener("click", carregarAgendamentos);
    filtroStatus.addEventListener("change", carregarAgendamentos);
    filtroData.addEventListener("change", carregarAgendamentos);

    limparFiltrosBtn.addEventListener("click", () => {
        filtroStatus.value = "";
        filtroData.value = "";
        carregarAgendamentos();
    });

    carregarAgendamentos();
</script>
</body>
</html>
