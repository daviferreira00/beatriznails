<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">

<div id="sidebar"></div>

<div class="min-h-screen md:ml-72">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>
            <div class="flex items-center gap-3">
                <img src="/assets/logo-beatriz-beauty.jpg" alt="Logo" class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]" />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Usuários</h1>
                    <p class="text-sm text-[#7d6a75]">Gerencie quem tem acesso ao sistema</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

            <section class="xl:col-span-1 bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm h-fit">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-[#3f3138]">Novo usuário</h2>
                </div>

                <form id="formUsuario" class="space-y-4">
                    <input id="nome" type="text" placeholder="Nome completo" required
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />

                    <input id="email" type="email" placeholder="E-mail de acesso" required
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />

                    <input id="senha" type="password" placeholder="Senha (Mínimo 6 caracteres)" required
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />

                    <select id="perfil" required
                            class="w-full rounded-2xl border border-[#e8d9e2] bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0] text-[#3f3138]">
                        <option value="admin">Administrador (Acesso Total)</option>
                        <option value="recepcao">Recepção (Agendamentos)</option>
                        <option value="profissional">Profissional (Visualiza Agenda)</option>
                    </select>

                    <button id="btnSalvar" type="submit"
                            class="w-full rounded-2xl bg-[#b78ea5] text-white py-3.5 font-semibold hover:bg-[#a97f97] transition">
                        Cadastrar usuário
                    </button>
                </form>

                <div id="mensagem" class="hidden mt-4 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>
            </section>

            <section class="xl:col-span-2 bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-xl font-semibold text-[#3f3138]">Usuários cadastrados</h2>
                    <button id="atualizarLista" class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-4 py-2 rounded-2xl font-medium transition">
                        Atualizar
                    </button>
                </div>

                <div id="listaUsuarios" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
        </div>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>
<script>
    const formUsuario = document.getElementById("formUsuario");
    const listaUsuarios = document.getElementById("listaUsuarios");
    const mensagem = document.getElementById("mensagem");
    const atualizarListaBtn = document.getElementById("atualizarLista");

    const nomeInput = document.getElementById("nome");
    const emailInput = document.getElementById("email");
    const senhaInput = document.getElementById("senha");
    const perfilInput = document.getElementById("perfil");

    const token = localStorage.getItem("token");

    function mostrarMensagem(texto, tipo = "erro") {
        mensagem.textContent = texto;
        mensagem.className = "mt-4 rounded-2xl px-4 py-3 text-sm font-medium text-center block";

        if (tipo === "sucesso") {
            mensagem.classList.add("bg-green-50", "text-green-700", "border", "border-green-200");
        } else {
            mensagem.classList.add("bg-red-50", "text-red-700", "border", "border-red-200");
        }
    }

    function limparMensagem() {
        mensagem.textContent = "";
        mensagem.className = "hidden mt-4 rounded-2xl px-4 py-3 text-sm font-medium text-center";
    }

    function formatarPerfil(perfil) {
        const perfis = {
            'admin': '<span class="px-3 py-1 bg-purple-50 text-purple-700 border border-purple-200 rounded-xl text-xs font-semibold">Administrador</span>',
            'recepcao': '<span class="px-3 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl text-xs font-semibold">Recepção</span>',
            'profissional': '<span class="px-3 py-1 bg-pink-50 text-[#b78ea5] border border-pink-200 rounded-xl text-xs font-semibold">Profissional</span>'
        };
        return perfis[perfil] || `<span class="px-3 py-1 bg-gray-50 text-gray-700 border border-gray-200 rounded-xl text-xs font-semibold">${perfil}</span>`;
    }

    function criarCardUsuario(usuario) {
        const card = document.createElement("div");
        card.className = "rounded-3xl border border-[#efe4ea] p-5 bg-[#fcfafb]";

        card.innerHTML = `
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <h3 class="text-lg font-semibold text-[#3f3138] break-words">${usuario.nome}</h3>
            <p class="text-sm text-[#7d6a75] mt-2">✉️ ${usuario.email}</p>
            <div class="mt-3">
                ${formatarPerfil(usuario.perfil)}
            </div>
          </div>

          <div class="flex flex-col gap-2 shrink-0">
            <button
              class="btn-remover bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-2xl font-medium transition"
              data-id="${usuario.id}"
            >
              Excluir
            </button>
          </div>
        </div>
      `;

        return card;
    }

    async function carregarUsuarios() {
        listaUsuarios.innerHTML = `
        <div class="col-span-full text-[#7d6a75]">Carregando usuários...</div>
      `;

        try {
            const response = await fetch("/api/usuarios", {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const usuarios = await response.json();

            if (!response.ok) {
                throw new Error(usuarios.erro || "Erro ao listar usuários");
            }

            listaUsuarios.innerHTML = "";

            if (!Array.isArray(usuarios) || usuarios.length === 0) {
                listaUsuarios.innerHTML = `
            <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
              Nenhum usuário cadastrado ainda.
            </div>
          `;
                return;
            }

            usuarios.forEach((usuario) => {
                listaUsuarios.appendChild(criarCardUsuario(usuario));
            });

            document.querySelectorAll(".btn-remover").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const id = btn.dataset.id;

                    if (!confirm("Deseja realmente excluir este usuário?")) return;

                    try {
                        const response = await fetch(`/api/usuarios/${id}`, {
                            method: "DELETE",
                            headers: { "Authorization": `Bearer ${token}` }
                        });

                        const data = await response.json();

                        if (response.ok) {
                            mostrarMensagem(data.mensagem || "Usuário removido com sucesso", "sucesso");
                            carregarUsuarios();
                        } else {
                            mostrarMensagem(data.erro || "Erro ao remover usuário");
                        }
                    } catch {
                        mostrarMensagem("Erro ao conectar com o servidor");
                    }
                });
            });
        } catch (error) {
            listaUsuarios.innerHTML = `
          <div class="col-span-full rounded-3xl border border-red-200 bg-red-50 p-6 text-center text-red-600">
            Erro ao carregar usuários.
          </div>
        `;
        }
    }

    formUsuario.addEventListener("submit", async (e) => {
        e.preventDefault();
        limparMensagem();

        const payload = {
            nome: nomeInput.value.trim(),
            email: emailInput.value.trim(),
            senha: senhaInput.value,
            perfil: perfilInput.value
        };

        try {
            const response = await fetch("/api/usuarios", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                mostrarMensagem(data.mensagem || "Usuário cadastrado com sucesso", "sucesso");
                formUsuario.reset();
                carregarUsuarios();
            } else {
                mostrarMensagem(data.erro || "Erro ao salvar usuário");
            }
        } catch {
            mostrarMensagem("Erro ao conectar com o servidor");
        }
    });

    atualizarListaBtn.addEventListener("click", carregarUsuarios);

    carregarUsuarios();
</script>
</body>
</html>
