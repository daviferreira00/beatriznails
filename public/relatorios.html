<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatórios | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">

<div id="sidebar"></div>

<div class="min-h-screen md:ml-72">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>
            <div class="flex items-center gap-3">
                <img src="/assets/logo-beatriz-beauty.jpg" class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]" />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Relatórios & Fidelidade</h1>
                    <p class="text-sm text-[#7d6a75]">Top serviços, top clientes e clientes inativas</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="mensagem" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>

        <!-- Filtros -->
        <section class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm mb-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-[#5e4b55] mb-2">Período (De)</label>
                    <input id="de" type="date"
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#5e4b55] mb-2">Período (Até)</label>
                    <input id="ate" type="date"
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#5e4b55] mb-2">Inativas há (dias)</label>
                    <input id="dias" type="number" min="1" value="60"
                           class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                </div>
            </div>

            <div class="mt-4 flex flex-col sm:flex-row gap-3">
                <button id="btnAtualizar"
                        class="rounded-2xl bg-[#b78ea5] text-white px-6 py-3.5 font-semibold hover:bg-[#a97f97] transition shadow-md">
                    Atualizar relatórios
                </button>

                <button id="btnMes"
                        class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-6 py-3.5 rounded-2xl font-semibold transition">
                    Este mês
                </button>

                <button id="btnHoje"
                        class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-6 py-3.5 rounded-2xl font-semibold transition">
                    Hoje
                </button>
            </div>

            <p class="text-xs text-[#7d6a75] mt-3">
                * Rankings consideram apenas agendamentos com <strong>pago = 1</strong>.
            </p>
        </section>

        <!-- Conteúdo -->
        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <!-- Top Serviços -->
            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-[#3f3138]">💅 Serviços mais realizados</h2>
                    <span id="countServicos" class="text-sm text-[#7d6a75]">0</span>
                </div>
                <div id="topServicos" class="space-y-3"></div>
            </div>

            <!-- Top Clientes -->
            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-[#3f3138]">🏆 Clientes (fidelidade)</h2>
                    <span id="countClientes" class="text-sm text-[#7d6a75]">0</span>
                </div>
                <div id="topClientes" class="space-y-3"></div>
                <p class="text-xs text-[#7d6a75] mt-4">Use essa lista para VIP e benefícios.</p>
            </div>
        </section>

        <!-- Inativas -->
        <section class="mt-6 bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-[#3f3138]">😴 Clientes inativas</h2>
                <span id="countInativas" class="text-sm text-[#7d6a75]">0</span>
            </div>

            <div id="inativas" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        </section>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>

<script>
    const msg = document.getElementById("mensagem");
    const deEl = document.getElementById("de");
    const ateEl = document.getElementById("ate");
    const diasEl = document.getElementById("dias");

    const btnAtualizar = document.getElementById("btnAtualizar");
    const btnMes = document.getElementById("btnMes");
    const btnHoje = document.getElementById("btnHoje");

    const topServicosEl = document.getElementById("topServicos");
    const topClientesEl = document.getElementById("topClientes");
    const inativasEl = document.getElementById("inativas");

    const countServicos = document.getElementById("countServicos");
    const countClientes = document.getElementById("countClientes");
    const countInativas = document.getElementById("countInativas");

    function show(texto, tipo="erro") {
        msg.textContent = texto;
        msg.className = "mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center block";
        if (tipo === "sucesso") msg.classList.add("bg-green-50","text-green-700","border","border-green-200");
        else msg.classList.add("bg-red-50","text-red-700","border","border-red-200");
    }
    function hide(){ msg.className = "hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center"; }

    function moeda(v){
        return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
    }
    function soNumeros(v){ return String(v||"").replace(/\D/g,""); }

    function setMesAtual() {
        const hoje = new Date();
        const y = hoje.getFullYear();
        const m = String(hoje.getMonth()+1).padStart(2,"0");
        deEl.value = `${y}-${m}-01`;
        const d = String(hoje.getDate()).padStart(2,"0");
        ateEl.value = `${y}-${m}-${d}`;
    }
    function setHojePeriodo() {
        const hoje = new Date();
        const y = hoje.getFullYear();
        const m = String(hoje.getMonth()+1).padStart(2,"0");
        const d = String(hoje.getDate()).padStart(2,"0");
        deEl.value = `${y}-${m}-${d}`;
        ateEl.value = `${y}-${m}-${d}`;
    }

    function cardLinha(titulo, subtitulo, direita) {
        const div = document.createElement("div");
        div.className = "rounded-2xl bg-[#fcfafb] border border-[#efe4ea] p-4 flex items-center justify-between gap-4";
        div.innerHTML = `
        <div class="min-w-0">
          <p class="font-semibold text-[#3f3138] break-words">${titulo}</p>
          <p class="text-sm text-[#7d6a75] mt-1">${subtitulo}</p>
        </div>
        <div class="text-right shrink-0">
          <p class="font-semibold text-[#b78ea5]">${direita}</p>
        </div>
      `;
        return div;
    }

    function cardInativa(c) {
        const div = document.createElement("div");
        div.className = "rounded-3xl border border-[#efe4ea] bg-[#fcfafb] p-5";

        const tel = c.telefone || "";
        const ultimo = c.ultimo_agendamento ? String(c.ultimo_agendamento).slice(0,10).split("-").reverse().join("/") : "Nunca agendou";

        const msgWpp = encodeURIComponent(
            `Oi, ${c.nome}! 💅✨ A Beatriz Beauty está com saudades! ` +
            `Quer que eu te ajude a marcar um horário essa semana?`
        );

        const link = tel ? `https://wa.me/55${soNumeros(tel)}?text=${msgWpp}` : "#";

        div.innerHTML = `
        <p class="font-semibold text-[#3f3138] break-words">${c.nome}</p>
        <p class="text-sm text-[#7d6a75] mt-2">📞 ${tel || "Não informado"}</p>
        <p class="text-sm text-[#7d6a75] mt-1">🗓️ Último: ${ultimo}</p>

        <div class="mt-4 grid grid-cols-1 gap-2">
          <a
            class="inline-flex w-full items-center justify-center rounded-2xl bg-green-600 px-4 py-3 text-white font-semibold hover:bg-green-700 transition"
            target="_blank"
            href="${tel ? link : "#"}"
          >
            Enviar WhatsApp
          </a>
        </div>
      `;
        return div;
    }

    async function carregarTudo() {
        hide();

        const de = deEl.value;
        const ate = ateEl.value;
        const dias = Number(diasEl.value || 60);

        if (!de || !ate) {
            show("Selecione o período (de/até).");
            return;
        }

        topServicosEl.innerHTML = "Carregando...";
        topClientesEl.innerHTML = "Carregando...";
        inativasEl.innerHTML = "Carregando...";

        try {
            const [rServ, rCli, rIna] = await Promise.all([
                fetch(`/api/relatorios/top-servicos?de=${de}&ate=${ate}`),
                fetch(`/api/relatorios/top-clientes?de=${de}&ate=${ate}`),
                fetch(`/api/relatorios/inativas?dias=${dias}&limite=60`)
            ]);

            const serv = await rServ.json();
            const cli = await rCli.json();
            const ina = await rIna.json();

            if (!rServ.ok) throw new Error(serv.erro || "Erro ao carregar top serviços");
            if (!rCli.ok) throw new Error(cli.erro || "Erro ao carregar top clientes");
            if (!rIna.ok) throw new Error(ina.erro || "Erro ao carregar inativas");

            // Serviços
            topServicosEl.innerHTML = "";
            countServicos.textContent = `${serv.length}`;
            if (!serv.length) {
                topServicosEl.innerHTML = `<div class="text-[#7d6a75]">Nenhum registro no período.</div>`;
            } else {
                serv.forEach(s => {
                    topServicosEl.appendChild(
                        cardLinha(
                            s.nome,
                            `Realizados: ${s.total_realizados} • Faturado: ${moeda(s.total_faturado)}`,
                            `#${s.total_realizados}`
                        )
                    );
                });
            }

            // Clientes
            topClientesEl.innerHTML = "";
            countClientes.textContent = `${cli.length}`;
            if (!cli.length) {
                topClientesEl.innerHTML = `<div class="text-[#7d6a75]">Nenhum registro no período.</div>`;
            } else {
                cli.forEach(c => {
                    const vip =
                        c.total_agendamentos >= 8 ? "VIP OURO" :
                            c.total_agendamentos >= 5 ? "VIP PRATA" :
                                c.total_agendamentos >= 3 ? "VIP BRONZE" : "—";

                    topClientesEl.appendChild(
                        cardLinha(
                            c.nome,
                            `Agendamentos: ${c.total_agendamentos} • Gasto: ${moeda(c.total_gasto)} • ${vip}`,
                            c.telefone ? `📞 ${c.telefone}` : "—"
                        )
                    );
                });
            }

            // Inativas
            inativasEl.innerHTML = "";
            countInativas.textContent = `${ina.length}`;
            if (!ina.length) {
                inativasEl.innerHTML = `
            <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
              Nenhuma cliente inativa para esse filtro.
            </div>
          `;
            } else {
                ina.forEach(c => inativasEl.appendChild(cardInativa(c)));
            }

        } catch (e) {
            show(e.message || "Erro ao carregar relatórios");
            topServicosEl.innerHTML = "";
            topClientesEl.innerHTML = "";
            inativasEl.innerHTML = "";
        }
    }

    btnAtualizar.addEventListener("click", carregarTudo);
    btnMes.addEventListener("click", () => { setMesAtual(); carregarTudo(); });
    btnHoje.addEventListener("click", () => { setHojePeriodo(); carregarTudo(); });

    setMesAtual();
    carregarTudo();
</script>
</body>
</html>
