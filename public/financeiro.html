<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financeiro | Beatriz Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f2f5] min-h-screen">
<div id="sidebar"></div>

<div class="min-h-screen md:ml-72">
    <header class="bg-white/95 border-b border-[#eadde5] px-4 md:px-8 py-4">
        <div class="flex items-center gap-3">
            <button id="openSidebar" class="md:hidden bg-[#b78ea5] text-white px-3 py-2 rounded-xl">☰</button>

            <div class="flex items-center gap-3">
                <img
                        src="/assets/logo-beatriz-beauty.jpg"
                        alt="Logo"
                        class="w-12 h-12 rounded-2xl object-cover border border-[#efe4ea]"
                />
                <div>
                    <h1 class="text-2xl font-semibold text-[#b78ea5]">Financeiro</h1>
                    <p class="text-sm text-[#7d6a75]">Controle de receitas e despesas</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="mensagem" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center"></div>

        <!-- Resumo -->
        <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Receitas (mês)</p>
                <h3 id="receitasMes" class="text-3xl font-semibold text-[#3f3138] mt-2">--</h3>
            </div>

            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Despesas (mês)</p>
                <h3 id="despesasMes" class="text-3xl font-semibold text-[#3f3138] mt-2">--</h3>
            </div>

            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Lucro (total)</p>
                <h3 id="lucroTotal" class="text-3xl font-semibold text-[#b78ea5] mt-2">--</h3>
            </div>

            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Materiais (mês)</p>
                <h3 id="materiaisMes" class="text-3xl font-semibold text-[#3f3138] mt-2">--</h3>
                <p class="text-xs text-[#7d6a75] mt-2">Futuro: virá do Estoque</p>
            </div>
        </section>

        <!-- Hoje -->
        <section class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Receitas (hoje)</p>
                <h3 id="receitasHoje" class="text-3xl font-semibold text-[#3f3138] mt-2">--</h3>
            </div>

            <div class="bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <p class="text-sm text-[#7d6a75]">Despesas (hoje)</p>
                <h3 id="despesasHoje" class="text-3xl font-semibold text-[#3f3138] mt-2">--</h3>
            </div>
        </section>

        <!-- Cadastro de despesa + Lista -->
        <section class="mt-8 grid grid-cols-1 xl:grid-cols-3 gap-6">
            <!-- Nova despesa -->
            <div class="xl:col-span-1 bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <h2 class="text-xl font-semibold text-[#3f3138] mb-4">Nova despesa</h2>

                <form id="formDespesa" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-[#5e4b55] mb-2">Descrição</label>
                        <input id="descricao" required type="text"
                               class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]"
                               placeholder="Ex: Compra de acetona" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-[#5e4b55] mb-2">Categoria</label>
                        <input id="categoria" type="text"
                               class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]"
                               placeholder="Ex: MATERIAIS, ALUGUEL, CONTAS..." />
                    </div>

                    <!-- Quantidade + Unitário -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-[#5e4b55] mb-2">Quantidade</label>
                            <input id="quantidade" required type="number" min="1" value="1"
                                   class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-[#5e4b55] mb-2">Valor unitário (R$)</label>
                            <input id="valor_unitario" type="number" step="0.01" min="0"
                                   placeholder="Ex: 12.50"
                                   class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                        </div>
                    </div>

                    <!-- Total -->
                    <div>
                        <label class="block text-sm font-medium text-[#5e4b55] mb-2">Total (R$)</label>
                        <input id="valor" required type="number" step="0.01" min="0"
                               placeholder="Total da despesa"
                               class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                        <p class="text-xs text-[#7d6a75] mt-2">
                            Se preencher valor unitário e quantidade, o total é calculado automaticamente.
                        </p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-[#5e4b55] mb-2">Data</label>
                        <input id="data_despesa" required type="date"
                               class="w-full rounded-2xl border border-[#e8d9e2] px-4 py-3 outline-none focus:ring-4 focus:ring-[#f3e7ee] focus:border-[#c29ab0]" />
                    </div>

                    <button type="submit"
                            class="w-full rounded-2xl bg-[#b78ea5] text-white py-3.5 font-semibold hover:bg-[#a97f97] transition">
                        Cadastrar despesa
                    </button>
                </form>
            </div>

            <!-- Lista de despesas -->
            <div class="xl:col-span-2 bg-white rounded-3xl border border-[#eadde5] p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-xl font-semibold text-[#3f3138]">Despesas</h2>
                    <button id="btnAtualizar" class="bg-[#f3e7ee] text-[#b78ea5] hover:bg-[#eddce6] px-4 py-2 rounded-2xl font-medium transition">
                        Atualizar
                    </button>
                </div>

                <div id="listaDespesas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>
    </main>
</div>

<script src="/components/sidebar.js"></script>
<script src="/components/auth.js"></script>
<script>
    const mensagemEl = document.getElementById("mensagem");

    const receitasMesEl = document.getElementById("receitasMes");
    const despesasMesEl = document.getElementById("despesasMes");
    const lucroTotalEl = document.getElementById("lucroTotal");
    const materiaisMesEl = document.getElementById("materiaisMes");
    const receitasHojeEl = document.getElementById("receitasHoje");
    const despesasHojeEl = document.getElementById("despesasHoje");

    const formDespesa = document.getElementById("formDespesa");
    const listaDespesasEl = document.getElementById("listaDespesas");
    const btnAtualizar = document.getElementById("btnAtualizar");

    // Campos para cálculo automático
    const qtdEl = document.getElementById("quantidade");
    const valorUnitEl = document.getElementById("valor_unitario");
    const valorTotalEl = document.getElementById("valor");

    function mostrarMensagem(texto, tipo="erro") {
        mensagemEl.textContent = texto;
        mensagemEl.className = "mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center block";
        if (tipo === "sucesso") {
            mensagemEl.classList.add("bg-green-50","text-green-700","border","border-green-200");
        } else {
            mensagemEl.classList.add("bg-red-50","text-red-700","border","border-red-200");
        }
    }

    function limparMensagem() {
        mensagemEl.textContent = "";
        mensagemEl.className = "hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium text-center";
    }

    function formatarMoeda(v) {
        return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
    }

    function formatarDataBR(dataISO) {
        if (!dataISO) return "-";
        const [y,m,d] = String(dataISO).slice(0,10).split("-");
        return `${d}/${m}/${y}`;
    }

    function recalcularTotal() {
        const qtd = Number(qtdEl.value || 1);
        const vUnit = valorUnitEl.value === "" ? null : Number(valorUnitEl.value);

        if (!Number.isNaN(qtd) && qtd > 0 && vUnit != null && !Number.isNaN(vUnit)) {
            const total = qtd * vUnit;
            valorTotalEl.value = total.toFixed(2);
        }
    }

    qtdEl.addEventListener("input", recalcularTotal);
    valorUnitEl.addEventListener("input", recalcularTotal);

    function cardDespesa(item) {
        const div = document.createElement("div");
        div.className = "rounded-3xl border border-[#efe4ea] p-5 bg-[#fcfafb]";

        const qtd = item.quantidade || 1;
        const unit = item.valor_unitario != null ? formatarMoeda(item.valor_unitario) : null;

        div.innerHTML = `
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="font-semibold text-[#3f3138] break-words">${item.descricao}</p>
            <p class="text-sm text-[#7d6a75] mt-2">📌 ${item.categoria || "Sem categoria"}</p>
            <p class="text-sm text-[#7d6a75] mt-1">📅 ${formatarDataBR(item.data_despesa)}</p>
            <p class="text-sm text-[#7d6a75] mt-1">🏷️ Origem: ${item.origem || "MANUAL"}</p>
            <p class="text-sm text-[#7d6a75] mt-1">📦 Qtd: ${qtd}${unit ? ` • Unit: ${unit}` : ""}</p>
            <p class="mt-3 font-semibold text-[#b78ea5]">Total: ${formatarMoeda(item.valor)}</p>
          </div>

          <button
            class="btn-excluir bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-2xl font-medium transition shrink-0"
            data-id="${item.id}"
          >
            Excluir
          </button>
        </div>
      `;
        return div;
    }

    async function carregarResumo() {
        const res = await fetch("/api/financeiro/resumo");
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || "Erro ao carregar resumo");

        receitasMesEl.textContent = formatarMoeda(data.receitas_mes);
        despesasMesEl.textContent = formatarMoeda(data.despesas_mes);
        lucroTotalEl.textContent = formatarMoeda(data.lucro_total);
        materiaisMesEl.textContent = formatarMoeda(data.materiais_mes);
        receitasHojeEl.textContent = formatarMoeda(data.receitas_hoje);
        despesasHojeEl.textContent = formatarMoeda(data.despesas_hoje);
    }

    async function carregarDespesas() {
        listaDespesasEl.innerHTML = `<div class="col-span-full text-[#7d6a75]">Carregando despesas...</div>`;
        const res = await fetch("/api/financeiro/despesas");
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || "Erro ao carregar despesas");

        listaDespesasEl.innerHTML = "";
        if (!Array.isArray(data) || data.length === 0) {
            listaDespesasEl.innerHTML = `
          <div class="col-span-full rounded-3xl border border-dashed border-[#eadde5] p-6 text-center text-[#7d6a75]">
            Nenhuma despesa cadastrada ainda.
          </div>
        `;
            return;
        }

        data.forEach(item => listaDespesasEl.appendChild(cardDespesa(item)));

        document.querySelectorAll(".btn-excluir").forEach(btn => {
            btn.addEventListener("click", async () => {
                const id = btn.dataset.id;
                if (!confirm("Deseja realmente excluir esta despesa?")) return;

                const res = await fetch(`/api/financeiro/despesas/${id}`, { method: "DELETE" });
                const d = await res.json();
                if (!res.ok) {
                    mostrarMensagem(d.erro || "Erro ao excluir despesa");
                    return;
                }

                mostrarMensagem(d.mensagem || "Despesa removida", "sucesso");
                await carregarResumo();
                await carregarDespesas();
            });
        });
    }

    function setHojeNoInput() {
        const el = document.getElementById("data_despesa");
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,"0");
        const day = String(d.getDate()).padStart(2,"0");
        el.value = `${y}-${m}-${day}`;
    }

    formDespesa.addEventListener("submit", async (e) => {
        e.preventDefault();
        limparMensagem();

        const payload = {
            descricao: document.getElementById("descricao").value.trim(),
            categoria: document.getElementById("categoria").value.trim(),
            quantidade: document.getElementById("quantidade").value,
            valor_unitario: document.getElementById("valor_unitario").value,
            valor: document.getElementById("valor").value,
            data_despesa: document.getElementById("data_despesa").value
        };

        try {
            const res = await fetch("/api/financeiro/despesas", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (!res.ok) {
                mostrarMensagem(data.erro || "Erro ao cadastrar despesa");
                return;
            }

            mostrarMensagem(data.mensagem || "Despesa cadastrada com sucesso", "sucesso");
            formDespesa.reset();
            document.getElementById("quantidade").value = 1;
            setHojeNoInput();
            await carregarResumo();
            await carregarDespesas();
        } catch {
            mostrarMensagem("Erro ao conectar com o servidor");
        }
    });

    btnAtualizar.addEventListener("click", async () => {
        limparMensagem();
        try {
            await carregarResumo();
            await carregarDespesas();
        } catch (e) {
            mostrarMensagem(e.message || "Erro ao atualizar financeiro");
        }
    });

    (async () => {
        try {
            setHojeNoInput();
            await carregarResumo();
            await carregarDespesas();
        } catch (e) {
            mostrarMensagem(e.message || "Erro ao carregar financeiro");
        }
    })();
</script>
</body>
</html>
